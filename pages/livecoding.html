<style>

  .warning {
  color: var(--shadow-colour2);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.lc-wrapper {
  max-width: 1200px;
  margin: 80px auto 0;
  padding: 0 20px;
  color: white;
}

.lc-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.lc-header h2 {
  font-size: 2rem;
    color: var(--shadow-colour2);
}

.lc-subtitle {
  max-width: 680px;
  margin-top: 12px;
  font-size: 0.95rem;
  line-height: 1.7;
  padding: 30px;
  font-weight: 300;
  letter-spacing: 0.2px;
  opacity: 0.7;
  color: #eaeaea;
}
.lc-tabs {
  display: flex;
  gap: 10px;
}

.tab-btn {
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid #444;
  background: transparent;
 border: 1px solid var(--shadow-colour4);
  color: var(--text-color);
  transition: 0.2s ease;
  cursor: pointer;
  transition: 0.2s;
}

.tab-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--shadow-colour3);
  transform: translateY(-1px);
}

.tab-btn.active {
  background: #e7d8ff;
  color: black;
  box-shadow: 0 0 5px var(--shadow-colour3);
  font-weight:500;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.grid iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 0;
  border-radius: 12px;
}

.instagram-media {
  margin: 0 auto !important;
  max-width: 100% !important;
  border-radius: 14px;
}

.copyright {
    width: 100%;
    text-align: center;
    padding: 25px 0;
    background: black;
    color: grey;
    font-weight: 300;
    margin-top: 50px; /* Adds clear separation from content above */
}

@media (max-width: 768px) {

  .lc-wrapper {
    margin: 60px auto;
    padding: 0 16px;
  }

  /* Stack header vertically */
  .lc-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .lc-header h2 {
    font-size: 1.5rem;
    line-height: 1.2;
  }

  .lc-subtitle {
    font-size: 0.9rem;
    line-height: 1.6;
    padding: 5px;
    max-width: 100%;
  }

  /* Tabs wrap instead of overflowing */
  .lc-tabs {
    flex-wrap: wrap;
    width: 100%;
  }

  .tab-btn {
    flex: 1;
    text-align: center;
    padding: 10px 12px;
    font-size: 0.9rem;
  }

  /* Grid becomes tighter */
  .grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }

  /* YouTube embeds stay readable */
  .grid iframe {
    aspect-ratio: 16 / 9;
    border-radius: 10px;
  }

  /* Instagram embeds spacing fix */
  .instagram-media {
    min-width: 0 !important;
    width: 100% !important;
  }
}
</style>

<!-- TAB SWITCHING -->
<script>
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });

  document.querySelectorAll('.tab-btn').forEach(el => {
    el.classList.remove('active');
  });

  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}
</script>
